<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Asg 5</title>
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
                }
            }
        </script>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { overflow: hidden; background: #000; }
            canvas { display: block; }

            #hud {
                position: fixed;
                top: 12px;
                left: 12px;
                color: #ffe8cc;
                font-family: 'Segoe UI', sans-serif;
                font-size: 13px;
                background: rgba(0, 0, 0, 0.45);
                padding: 10px 14px;
                border-radius: 8px;
                border: 1px solid rgba(255, 160, 60, 0.35);
                pointer-events: none;
                line-height: 1.7;
            }
            #hud h2 {
                font-size: 15px;
                color: #ffcc88;
                margin-bottom: 4px;
            }
            #wow {
                position: fixed;
                bottom: 12px;
                right: 12px;
                color: #ffe088;
                font-family: 'Segoe UI', sans-serif;
                font-size: 12px;
                background: rgba(0, 0, 0, 0.45);
                padding: 8px 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 220, 80, 0.3);
                pointer-events: none;
                max-width: 270px;
                line-height: 1.5;
            }
            #wow span { color: #ffcc44; font-weight: bold; }
        </style>
    </head>
    <body>
        <div id="hud">
            <h2>Controls</h2>
            Hit Balls: Left click near a ball<br>
            Left-drag: orbit &nbsp;|&nbsp; Right-drag: pan<br>
            Scroll: zoom &nbsp;|&nbsp; Double-click: reset view
        </div>

        <div id="wow">
            Interactive golf balls. Hit balls by clicking near a ball. Balls reset to original position if put in a hole.
        </div>

        <script type="module" src="asg5.js"></script>
    </body>
</html>
