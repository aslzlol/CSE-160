    <h3>Global Rotation</h3>
    <label for="angleSlide">Angle:</label>
    <input type="range" id="angleSlide" min="-180" max="180" step="1" value="0" style="width: 200px;">
    <span id="angleValue">0</span>°

    <h3>Light Position</h3>
    Light X: <input type="range" class="slider" id="lightXSlide" min="-250" max="250" value="0" style="width: 200px;">
    Light Y: <input type="range" class="slider" id="lightYSlide" min="10" max="550" value="100" style="width: 200px;">
    Light Z: <input type="range" class="slider" id="lightZSlide" min="-450" max="450" value="-210" style="width: 200px;">

    <h3>Light Color</h3>
    Light R: <input type="range" class="slider" id="lightRSlide" min="0" max="1" step="0.01" value="1" style="width: 200px;">
    Light G: <input type="range" class="slider" id="lightGSlide" min="0" max="1" step="0.01" value="1" style="width: 200px;">
    Light B: <input type="range" class="slider" id="lightBSlide" min="0" max="1" step="0.01" value="1" style="width: 200px;">
